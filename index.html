<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Los Juegos de Mates de Dante</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffe81f;--cyan:#4fe0ff;--green:#7bd63f;--amber:#ffb400;--red:#ff3b30;
    --arcade:"Press Start 2P","Courier New",monospace;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{font-family:'Trebuchet MS',system-ui,sans-serif;color:#fff;overflow:hidden;user-select:none;-webkit-user-select:none;
    /* mitad espacio (arriba) · mitad jungla (abajo) */
    background:linear-gradient(180deg,#01030c 0%,#060f2a 42%,#0f2a14 58%,#0a1b0d 100%);}
  canvas#bg{position:fixed;inset:0;z-index:0;display:block;}
  #crt{position:fixed;inset:0;z-index:9;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.14) 3px,rgba(0,0,0,0) 4px),
      radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.5) 100%);mix-blend-mode:multiply;opacity:.6;}

  .wrap{position:relative;z-index:2;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px 14px;gap:8px;}
  h1{font-family:var(--arcade);font-size:clamp(16px,5vw,32px);text-align:center;margin:6px 0 2px;color:var(--gold);
    text-shadow:0 0 8px #ff8a00,0 0 18px rgba(255,232,31,.55),3px 3px 0 #7a1400;line-height:1.5;}
  .sub{font-family:var(--arcade);text-align:center;color:var(--cyan);font-size:clamp(8px,2.6vw,12px);
    margin:0 0 18px;text-shadow:0 0 8px var(--cyan);}
  .cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:760px;}

  .card{flex:1 1 300px;min-width:260px;max-width:360px;cursor:pointer;text-decoration:none;color:#fff;
    border-radius:20px;padding:22px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;
    border:3px solid;transition:transform .12s,box-shadow .12s;backdrop-filter:blur(3px);}
  .card:active{transform:scale(.97);}
  .card .ico{font-size:clamp(54px,15vw,78px);line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));}
  .card .t{font-family:var(--arcade);font-size:clamp(12px,3.2vw,17px);line-height:1.5;}
  .card .d{font-size:clamp(12px,3.2vw,14px);line-height:1.4;opacity:.92;}
  .card .op{font-family:var(--arcade);font-size:clamp(10px,2.6vw,13px);margin-top:2px;padding:6px 12px;border-radius:999px;}
  .card .go{font-family:var(--arcade);font-size:clamp(11px,3vw,15px);margin-top:6px;padding:13px 18px;border-radius:12px;color:#04121f;}

  .card.space{border-color:#3aa0ff;background:linear-gradient(180deg,rgba(10,20,50,.78),rgba(6,12,34,.85));
    box-shadow:0 0 0 2px #05122a,0 0 26px rgba(58,160,255,.45),inset 0 0 26px rgba(58,160,255,.08);}
  .card.space .t{color:var(--gold);text-shadow:0 0 8px rgba(255,232,31,.5);}
  .card.space .op{color:var(--cyan);border:2px solid #2f6f9f;background:rgba(0,0,0,.35);}
  .card.space .go{background:linear-gradient(180deg,#ffe81f,#e0b000);box-shadow:0 5px 0 #7a5f00;}
  .card.space:hover{box-shadow:0 0 0 2px #05122a,0 0 40px rgba(58,160,255,.7),inset 0 0 26px rgba(58,160,255,.12);}

  .card.jungle{border-color:#3fae2a;background:linear-gradient(180deg,rgba(16,40,18,.8),rgba(9,20,11,.86));
    box-shadow:0 0 0 2px #04120a,0 0 26px rgba(63,174,42,.45),inset 0 0 26px rgba(63,174,42,.08);}
  .card.jungle .t{color:var(--amber);text-shadow:0 0 8px rgba(255,180,0,.5);}
  .card.jungle .op{color:var(--green);border:2px solid #2a6b1c;background:rgba(0,0,0,.35);}
  .card.jungle .go{background:linear-gradient(180deg,#a7ff6b,#3fae2a);box-shadow:0 5px 0 #1a6b12;color:#0a1c06;}
  .card.jungle:hover{box-shadow:0 0 0 2px #04120a,0 0 40px rgba(63,174,42,.7),inset 0 0 26px rgba(63,174,42,.12);}

  .foot{font-family:var(--arcade);text-align:center;color:#9fb6d8;font-size:clamp(7px,2vw,10px);margin-top:22px;opacity:.8;}
  @media (max-width:520px){ .cards{gap:14px;} .card{flex:1 1 100%;max-width:420px;} }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="crt"></div>
<div class="wrap">
  <h1>LOS JUEGOS DE MATES<br>DE DANTE</h1>
  <p class="sub">ELIGE TU AVENTURA 👇</p>
  <div class="cards">
    <a class="card space" href="multiplicaciones.html">
      <div class="ico">🚀</div>
      <div class="t">LA GALAXIA DE LAS MATES</div>
      <div class="d">Tablas de multiplicar · Star Wars</div>
      <div class="op">✖️ MULTIPLICAR</div>
      <div class="go">▶ JUGAR</div>
    </a>
    <a class="card jungle" href="sumas-restas.html">
      <div class="ico">🦖</div>
      <div class="t">LA ISLA DE LOS NÚMEROS</div>
      <div class="d">Sumas y restas · Jurassic World</div>
      <div class="op">➕➖ SUMAR Y RESTAR</div>
      <div class="go">▶ JUGAR</div>
    </a>
  </div>
  <div class="foot">HECHO CON ❤️ PARA DANTE</div>
</div>

<script>
/* Fondo: estrellas arriba (espacio), esporas/luciérnagas abajo (jungla) */
(function(){
  const cv=document.getElementById('bg'),ctx=cv.getContext('2d');let W,H,pts=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;pts=[];
    for(let i=0;i<150;i++){const y=Math.random()*H,space=y<H*0.5;
      pts.push({x:Math.random()*W,y,z:Math.random()*1.6+.4,s:Math.random()*1.6+.4,space,
        hue:space?'#fff':(Math.random()<.5?'#7bd63f':'#ffb400'),ph:Math.random()*6});}}
  addEventListener('resize',resize);resize();
  (function loop(){ctx.clearRect(0,0,W,H);
    for(const p of pts){
      if(p.space){p.x-=p.z*.3;if(p.x<0){p.x=W;p.y=Math.random()*H*0.5;}ctx.globalAlpha=.4+p.z*.3;}
      else{p.y-=p.z*.25;p.ph+=.03;p.x+=Math.sin(p.ph)*.3;if(p.y<H*0.5){p.y=H;p.x=Math.random()*W;}
        ctx.globalAlpha=.25+p.z*.2*(0.6+0.4*Math.sin(p.ph));}
      ctx.fillStyle=p.hue;ctx.fillRect(p.x,p.y,p.s,p.s);}
    ctx.globalAlpha=1;requestAnimationFrame(loop);})();
})();
</script>
</body>
</html>
